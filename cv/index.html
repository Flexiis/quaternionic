<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Felix Douven — CV</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,500;0,600;0,700;0,800&display=swap" rel="stylesheet">

<style>
  :root{
    --desktop-bg-1:#ecdfc4;
    --desktop-bg-2:#ddc99c;
    --window-bg:#f6efdc;
    --window-header:#e2ce9d;
    --border:#a9885a;
    --ink:#3b2c1e;
    --ink-soft:#7d6a4e;
    --rust:#c1623d;
    --brick:#ab4a41;
    --gold:#c69a3a;
    --olive:#6f7d4a;
    --paper:#fbf6ea;
    --radius:10px;
    --font-mono:'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; height:100%; }
  body{
    font-family:var(--font-mono); color:var(--ink);
    background:
      radial-gradient(circle at 1px 1px, rgba(59,44,30,0.07) 1px, transparent 0) 0 0/22px 22px,
      linear-gradient(160deg, var(--desktop-bg-1), var(--desktop-bg-2));
    min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px;
  }
  .window{
    width:100%; max-width:900px; height:88vh;
    display:flex; flex-direction:column;
    background:var(--window-bg); border:1px solid var(--border);
    border-radius:var(--radius); box-shadow:0 16px 34px rgba(59,44,30,.28);
    overflow:hidden;
  }
  .win-titlebar{
    display:flex; align-items:center; gap:10px; height:38px; min-height:38px; padding:0 12px;
    background:var(--window-header); border-bottom:1px solid var(--border);
  }
  .win-controls{ display:flex; gap:7px; }
  .win-btn{ width:11px; height:11px; border-radius:50%; }
  .win-btn.close{ background:var(--brick); }
  .win-btn.min{ background:var(--gold); }
  .win-btn.max{ background:var(--olive); }
  .win-title{ font-size:12.5px; color:var(--ink-soft); font-weight:600; }
  .win-toolbar{
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    padding:10px 14px; border-bottom:1px solid var(--border); background:var(--paper); flex-wrap:wrap;
  }
  .pill-link{
    border:1px solid var(--border); border-radius:6px; padding:5px 10px;
    font-size:12px; color:var(--ink); background:var(--paper); text-decoration:none;
  }
  .pill-link:hover{ background:var(--rust); color:var(--paper); border-color:var(--rust); }
  .pdf-wrap{ flex:1; background:#5b503d; }
  .pdf-wrap embed{ width:100%; height:100%; border:none; display:block; }
</style>
</head>
<body>

  <div class="window">
    <div class="win-titlebar">
      <div class="win-controls">
        <span class="win-btn close"></span>
        <span class="win-btn min"></span>
        <span class="win-btn max"></span>
      </div>
      <div class="win-title">cv.pdf — Felix Douven</div>
    </div>

    <div class="win-toolbar">
      <a class="pill-link" href="../index.html">[ ← Back to portfolio ]</a>
      <a class="pill-link" href="../pictures/FelixDouvenCVInternational2026_Website.pdf" download>[ ⬇ Download PDF ]</a>
    </div>

    <div class="pdf-wrap">
      <embed src="../pictures/FelixDouvenCVInternational2026_Website.pdf" type="application/pdf">
    </div>
  </div>

</body>
</html>
